<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Granty.sk — EU Výzvy</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Instrument+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a08;
      --s1: #111110;
      --s2: #1a1a18;
      --s3: #242420;
      --b1: rgba(255,255,255,0.06);
      --b2: rgba(255,255,255,0.10);
      --b3: rgba(255,255,255,0.16);
      --gold: #c9a84c;
      --gold2: #e8c97a;
      --gold-dim: rgba(201,168,76,0.12);
      --gold-dim2: rgba(201,168,76,0.06);
      --t1: #f0ede8;
      --t2: #9a9690;
      --t3: #5a5650;
      --ok: #4a9e6a;
      --err: #9e4a4a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Instrument Sans', sans-serif;
      background: var(--bg);
      color: var(--t1);
      min-height: 100vh;
      font-weight: 300;
    }

    header {
      padding: 2rem 3rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--b1);
      position: sticky;
      top: 0;
      background: rgba(10,10,8,0.92);
      backdrop-filter: blur(20px);
      z-index: 100;
    }

    .brand { display: flex; align-items: baseline; gap: 10px; }
    .brand-name { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; color: var(--t1); letter-spacing: -0.3px; }
    .brand-dot { color: var(--gold); }
    .brand-tag { font-size: 11px; font-weight: 400; color: var(--t3); letter-spacing: 2px; text-transform: uppercase; }
    .header-right { font-size: 11px; color: var(--t3); letter-spacing: 1.5px; text-transform: uppercase; }

    .container { max-width: 820px; margin: 0 auto; padding: 5rem 2rem 4rem; }

    .hero { margin-bottom: 5rem; }

    .hero-eyebrow { display: flex; align-items: center; gap: 12px; margin-bottom: 2rem; }
    .hero-line { width: 32px; height: 1px; background: var(--gold); opacity: 0.6; }
    .hero-eyebrow span { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); font-weight: 400; }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.8rem, 6vw, 4.5rem);
      font-weight: 400;
      line-height: 1.08;
      letter-spacing: -1px;
      color: var(--t1);
      margin-bottom: 1.75rem;
    }

    .hero h1 em { font-style: italic; color: var(--gold2); }

    .hero-sub { font-size: 15px; color: var(--t2); line-height: 1.8; max-width: 440px; font-weight: 300; }

    .divider { width: 100%; height: 1px; background: var(--b1); margin: 4rem 0; }

    .section-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--t3); margin-bottom: 1.5rem; font-weight: 400; }

    .ministry-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 6px; margin-bottom: 2.5rem; }

    .ministry-tag {
      padding: 10px 14px;
      border: 1px solid var(--b1);
      border-radius: 4px;
      font-size: 12px;
      color: var(--t3);
      cursor: pointer;
      background: transparent;
      transition: all 0.2s;
      font-family: 'Instrument Sans', sans-serif;
      font-weight: 400;
      letter-spacing: 0.3px;
      display: flex;
      align-items: center;
      gap: 8px;
      user-select: none;
    }

    .ministry-tag:hover { border-color: var(--b2); color: var(--t2); }
    .ministry-tag.active { border-color: rgba(201,168,76,0.35); background: var(--gold-dim2); color: var(--gold2); }

    .ministry-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--b2); flex-shrink: 0; transition: all 0.2s; }
    .ministry-tag.active .ministry-dot { background: var(--gold); }

    .scan-btn {
      width: 100%;
      padding: 18px 24px;
      background: transparent;
      border: 1px solid var(--gold);
      border-radius: 4px;
      font-size: 12px;
      font-weight: 400;
      font-family: 'Instrument Sans', sans-serif;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: all 0.25s;
      margin-bottom: 1.5rem;
    }

    .scan-btn:hover { background: var(--gold-dim); color: var(--gold2); border-color: var(--gold2); }
    .scan-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .btn-spinner {
      width: 14px; height: 14px;
      border: 1px solid rgba(201,168,76,0.3);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .status {
      display: none;
      padding: 14px 18px;
      border-radius: 4px;
      font-size: 12px;
      margin-bottom: 1.5rem;
      align-items: center;
      gap: 10px;
      letter-spacing: 0.5px;
      font-weight: 300;
    }

    .status.scanning { display: flex; border: 1px solid rgba(201,168,76,0.2); color: var(--gold); background: var(--gold-dim2); }
    .status.done { display: flex; border: 1px solid rgba(74,158,106,0.25); color: #7dc49a; background: rgba(74,158,106,0.06); }
    .status.error { display: flex; border: 1px solid rgba(158,74,74,0.25); color: #c47d7d; background: rgba(158,74,74,0.06); }

    .st-spin { width: 13px; height: 13px; border: 1px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }

    .results-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 2rem; }
    .results-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 400; color: var(--t1); }
    .count-pill { font-size: 11px; padding: 4px 14px; border-radius: 99px; border: 1px solid rgba(201,168,76,0.3); color: var(--gold); font-weight: 400; letter-spacing: 1px; }

    .filter-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 2rem; }
    .filter-btn { font-size: 11px; padding: 5px 14px; border: 1px solid var(--b1); border-radius: 99px; background: transparent; color: var(--t3); cursor: pointer; font-family: 'Instrument Sans', sans-serif; font-weight: 400; letter-spacing: 0.5px; transition: all 0.15s; }
    .filter-btn:hover { border-color: var(--b2); color: var(--t2); }
    .filter-btn.active { border-color: rgba(201,168,76,0.35); color: var(--gold); background: var(--gold-dim2); }

    .vyzva-card { border-top: 1px solid var(--b1); padding: 2rem 0; transition: all 0.2s; }
    .vyzva-card:last-child { border-bottom: 1px solid var(--b1); }
    .vyzva-card:hover { padding-left: 1rem; border-top-color: var(--b2); }

    .vyzva-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-bottom: 10px; }
    .vyzva-title { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 400; color: var(--t1); line-height: 1.4; }
    .vyzva-ministry { font-size: 10px; padding: 4px 12px; border-radius: 99px; border: 1px solid var(--b1); color: var(--t3); white-space: nowrap; flex-shrink: 0; letter-spacing: 1px; text-transform: uppercase; font-weight: 400; }
    .vyzva-summary { font-size: 13px; color: var(--t2); line-height: 1.8; margin-bottom: 1.25rem; font-weight: 300; max-width: 600px; }
    .vyzva-meta { display: flex; flex-wrap: wrap; align-items: center; gap: 20px; }
    .meta-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--t3); }
    .meta-key { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--t3); opacity: 0.6; }
    .meta-val { color: var(--t2); }
    .vyzva-link { font-size: 11px; color: var(--gold); text-decoration: none; letter-spacing: 1px; text-transform: uppercase; margin-left: auto; opacity: 0.7; transition: opacity 0.15s; }
    .vyzva-link:hover { opacity: 1; }

    .empty { text-align: center; padding: 6rem 1rem; color: var(--t3); font-size: 13px; letter-spacing: 1px; font-style: italic; font-family: 'Playfair Display', serif; }

    footer { text-align: center; padding: 3rem 2rem; font-size: 10px; color: var(--t3); letter-spacing: 2px; text-transform: uppercase; border-top: 1px solid var(--b1); }

    @media (max-width: 600px) {
      header { padding: 1.25rem 1.5rem; }
      .container { padding: 3rem 1.25rem; }
      .hero h1 { font-size: 2.5rem; }
      .ministry-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-name">Granty<span class="brand-dot">.</span>sk</div>
    <div class="brand-tag">EU Fondy</div>
  </div>
  <div class="header-right">Slovensko · 2026</div>
</header>

<div class="container">

  <div class="hero">
    <div class="hero-eyebrow">
      <div class="hero-line"></div>
      <span>Automatický monitoring</span>
    </div>
    <h1>Nájdi <em>európske</em><br>granty včas</h1>
    <p class="hero-sub">Umelá inteligencia prehľadá stránky slovenských ministerstiev a zobrazí aktuálne výzvy na čerpanie EU fondov.</p>
  </div>

  <div class="section-label">Vyber ministerstvá</div>

  <div class="ministry-grid" id="ministryGrid"></div>

  <button class="scan-btn" id="scanBtn" onclick="startScan()">
    <div class="btn-spinner" id="spinner"></div>
    <span id="scanBtnText">Spustiť skenovanie</span>
  </button>

  <div class="status" id="statusBar">
    <div class="st-spin" id="stSpin"></div>
    <span id="statusText"></span>
  </div>

  <div id="resultsSection" style="display:none">
    <div class="divider"></div>
    <div class="results-header">
      <div class="results-title">Výsledky</div>
      <span class="count-pill" id="countBadge">0</span>
    </div>
    <div class="filter-row" id="filterRow"></div>
    <div id="vyzvaList"></div>
  </div>

</div>

<footer>Granty.sk &nbsp;·&nbsp; Powered by Claude AI &nbsp;·&nbsp; Slovenské ministerstvá</footer>

<script>
const MINISTRIES = [
  { id: 'mpsr',  name: 'Pôdohospodárstvo',  url: 'https://www.mpsr.sk' },
  { id: 'mhsr',  name: 'Hospodárstvo',       url: 'https://www.mhsr.sk' },
  { id: 'mfsr',  name: 'Financie',           url: 'https://www.mfsr.sk' },
  { id: 'mirri', name: 'MIRRI SR',           url: 'https://www.mirri.gov.sk' },
  { id: 'mdsr',  name: 'Doprava',            url: 'https://www.mindop.sk' },
  { id: 'mzsr',  name: 'Zdravotníctvo',      url: 'https://www.health.gov.sk' },
  { id: 'msssr', name: 'Školstvo',           url: 'https://www.minedu.sk' },
  { id: 'mpsvr', name: 'Práca a soc. veci', url: 'https://www.employment.gov.sk' },
  { id: 'mzpsr', name: 'Živ. prostredie',   url: 'https://www.minzp.sk' },
  { id: 'mvsr',  name: 'Vnútro',            url: 'https://www.minv.sk' },
];

let selected = new Set(MINISTRIES.map(m => m.id));
let allVyzvy = [];

function renderMinistries() {
  document.getElementById('ministryGrid').innerHTML = MINISTRIES.map(m => `
    <div class="ministry-tag active" id="tag_${m.id}" onclick="toggleMinistry('${m.id}')">
      <div class="ministry-dot"></div>
      <span>${m.name}</span>
    </div>
  `).join('');
}

function toggleMinistry(id) {
  if (selected.has(id)) { selected.delete(id); document.getElementById('tag_'+id).classList.remove('active'); }
  else { selected.add(id); document.getElementById('tag_'+id).classList.add('active'); }
}

function setStatus(msg, type) {
  const bar = document.getElementById('statusBar');
  bar.className = 'status ' + type;
  document.getElementById('statusText').textContent = msg;
  document.getElementById('stSpin').style.display = type === 'scanning' ? 'block' : 'none';
}

async function startScan() {
  if (!selected.size) { alert('Vyber aspoň jedno ministerstvo.'); return; }
  const btn = document.getElementById('scanBtn');
  btn.disabled = true;
  document.getElementById('spinner').style.display = 'block';
  document.getElementById('scanBtnText').textContent = 'Prebieha skenovanie...';
  document.getElementById('resultsSection').style.display = 'none';
  allVyzvy = [];

  const selectedMins = MINISTRIES.filter(m => selected.has(m.id));
  setStatus(`Skenujem ${selectedMins.length} ministerstiev — môže trvať 30–60 sekúnd`, 'scanning');

  try {
    const resp = await fetch('/api/scan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ministries: selectedMins })
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || 'Chyba servera');
    allVyzvy = data.vyzvy || [];
    document.getElementById('resultsSection').style.display = 'block';
    document.getElementById('countBadge').textContent = allVyzvy.length;
    if (allVyzvy.length) {
      buildFilters();
      renderVyzvy(allVyzvy);
      setStatus(`Dokončené — nájdených ${allVyzvy.length} výziev`, 'done');
    } else {
      renderVyzvy([]);
      setStatus('Skenovanie dokončené — žiadne výzvy nenájdené', 'done');
    }
  } catch (err) {
    setStatus('Chyba: ' + err.message, 'error');
  }

  btn.disabled = false;
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('scanBtnText').textContent = 'Spustiť znova';
}

function buildFilters() {
  const mins = [...new Set(allVyzvy.map(v => v.ministry))];
  document.getElementById('filterRow').innerHTML =
    `<button class="filter-btn active" onclick="filterBy('all',this)">Všetky (${allVyzvy.length})</button>` +
    mins.map(m => {
      const c = allVyzvy.filter(v => v.ministry === m).length;
      return `<button class="filter-btn" onclick="filterBy('${m}',this)">${m} (${c})</button>`;
    }).join('');
}

function filterBy(m, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const list = m === 'all' ? allVyzvy : allVyzvy.filter(v => v.ministry === m);
  document.getElementById('countBadge').textContent = list.length;
  renderVyzvy(list);
}

function renderVyzvy(vyzvy) {
  const el = document.getElementById('vyzvaList');
  if (!vyzvy.length) {
    el.innerHTML = '<div class="empty">Žiadne výzvy nenájdené.</div>';
    return;
  }
  el.innerHTML = vyzvy.map(v => `
    <div class="vyzva-card">
      <div class="vyzva-top">
        <div class="vyzva-title">${esc(v.title||'–')}</div>
        <div class="vyzva-ministry">${esc(v.ministry||'')}</div>
      </div>
      <div class="vyzva-summary">${esc(v.summary||'')}</div>
      <div class="vyzva-meta">
        ${v.deadline?`<div class="meta-item"><span class="meta-key">Termín</span><span class="meta-val">${esc(v.deadline)}</span></div>`:''}
        ${v.amount?`<div class="meta-item"><span class="meta-key">Suma</span><span class="meta-val">${esc(v.amount)}</span></div>`:''}
        ${v.fund?`<div class="meta-item"><span class="meta-key">Fond</span><span class="meta-val">${esc(v.fund)}</span></div>`:''}
        ${v.url?`<a class="vyzva-link" href="${esc(v.url)}" target="_blank">Detail →</a>`:''}
      </div>
    </div>
  `).join('');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

renderMinistries();
</script>
</body>
</html>
