<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Granty.sk — EU Výzvy</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #03153b;
      --s1: #041a47;
      --s2: #062060;
      --b1: rgba(255,255,255,0.07);
      --b2: rgba(255,255,255,0.13);
      --gold: #f5c842;
      --gold2: #ffe07a;
      --gold-dim: rgba(245,200,66,0.10);
      --gold-dim2: rgba(245,200,66,0.05);
      --t1: #ffffff;
      --t2: #a8bbd4;
      --t3: #556a88;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--t1);
      min-height: 100vh;
      font-weight: 300;
    }

    header {
      padding: 1.5rem 3rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--b1);
      position: sticky;
      top: 0;
      background: rgba(3,21,59,0.95);
      backdrop-filter: blur(20px);
      z-index: 100;
    }

    .brand { display: flex; align-items: center; gap: 14px; }

    .eu-flag {
      width: 42px; height: 28px;
      background: #003399;
      border-radius: 3px;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; letter-spacing: 2px; color: var(--gold);
      border: 1px solid rgba(245,200,66,0.3);
      flex-shrink: 0; line-height: 1.2; text-align: center; padding: 2px;
    }

    .brand-text { display: flex; flex-direction: column; gap: 1px; }
    .brand-name { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; }
    .brand-sub { font-size: 10px; color: var(--t3); letter-spacing: 2px; text-transform: uppercase; }

    .sk-badge {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 12px; border: 1px solid var(--b2);
      border-radius: 99px; font-size: 10px; color: var(--t2);
    }

    .sk-flag {
      width: 18px; height: 12px;
      background: linear-gradient(180deg, #fff 33%, #0b4ea2 33%, #0b4ea2 66%, #ee1c25 66%);
      border-radius: 1px; flex-shrink: 0;
    }

    .container { position: relative; z-index: 10; max-width: 860px; margin: 0 auto; padding: 4rem 2rem; }

    .hero { margin-bottom: 4rem; text-align: center; }

    .eu-circle {
      width: 72px; height: 72px;
      background: #003399; border-radius: 50%;
      border: 2px solid rgba(245,200,66,0.4);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; letter-spacing: 3px; color: var(--gold);
      margin: 0 auto 2rem;
      box-shadow: 0 0 40px rgba(0,51,153,0.6), 0 0 0 8px rgba(245,200,66,0.06);
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 5vw, 3.8rem);
      font-weight: 400; line-height: 1.1;
      letter-spacing: -0.5px; margin-bottom: 1.25rem;
    }

    .hero h1 em { font-style: italic; color: var(--gold2); }

    .hero-tags { display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap; }
    .hero-tag { font-size: 11px; color: var(--t3); letter-spacing: 1.5px; text-transform: uppercase; padding: 5px 14px; border: 1px solid var(--b1); border-radius: 99px; }
    .hero-sep { color: var(--t3); font-size: 10px; }

    .divider { width: 100%; height: 1px; background: var(--b1); margin: 3rem 0; }

    .section-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--t3); margin-bottom: 1.25rem; }

    .ministry-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 8px; margin-bottom: 2.5rem; }

    .ministry-tag {
      padding: 14px 18px; border: 1px solid var(--b1); border-radius: 6px;
      font-size: 13px; color: var(--t3); cursor: pointer;
      background: rgba(255,255,255,0.02); transition: all 0.2s;
      font-family: 'Inter', sans-serif; font-weight: 400;
      display: flex; align-items: center; gap: 12px; user-select: none;
    }

    .ministry-tag:hover { border-color: var(--b2); color: var(--t2); background: rgba(255,255,255,0.04); }
    .ministry-tag.active { border-color: rgba(245,200,66,0.4); background: rgba(245,200,66,0.06); color: var(--t1); }

    .min-icon {
      width: 32px; height: 32px; border-radius: 6px;
      background: var(--s2); border: 1px solid var(--b1);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; flex-shrink: 0; transition: all 0.2s;
    }

    .ministry-tag.active .min-icon { background: rgba(245,200,66,0.12); border-color: rgba(245,200,66,0.3); }

    .scan-btn {
      width: 100%; padding: 20px 24px;
      background: #003399; border: 1px solid rgba(245,200,66,0.5);
      border-radius: 6px; font-size: 13px; font-weight: 500;
      font-family: 'Inter', sans-serif; letter-spacing: 2px;
      text-transform: uppercase; color: var(--gold); cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 12px;
      transition: all 0.25s; margin-bottom: 1.5rem;
      box-shadow: 0 4px 24px rgba(0,51,153,0.4);
    }

    .scan-btn:hover { background: #0044cc; border-color: var(--gold); box-shadow: 0 6px 32px rgba(0,51,153,0.6); }
    .scan-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(245,200,66,0.3);
      border-top-color: var(--gold);
      border-radius: 50%; animation: spin 0.8s linear infinite; display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .status {
      display: none; padding: 14px 18px; border-radius: 6px;
      font-size: 12px; margin-bottom: 1.5rem;
      align-items: center; gap: 10px; letter-spacing: 0.5px; font-weight: 300;
    }

    .status.scanning { display: flex; border: 1px solid rgba(245,200,66,0.2); color: var(--gold); background: rgba(245,200,66,0.05); }
    .status.done { display: flex; border: 1px solid rgba(74,158,106,0.25); color: #7dc49a; background: rgba(74,158,106,0.06); }
    .status.error { display: flex; border: 1px solid rgba(196,125,125,0.25); color: #c47d7d; background: rgba(196,125,125,0.06); }

    .st-spin { width: 13px; height: 13px; border: 1px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }

    .results-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 2rem; }
    .results-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 400; }
    .count-pill { font-size: 11px; padding: 4px 14px; border-radius: 99px; border: 1px solid rgba(245,200,66,0.3); color: var(--gold); letter-spacing: 1px; }

    .filter-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 2rem; }
    .filter-btn { font-size: 11px; padding: 6px 14px; border: 1px solid var(--b1); border-radius: 99px; background: transparent; color: var(--t3); cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.15s; }
    .filter-btn:hover { border-color: var(--b2); color: var(--t2); }
    .filter-btn.active { border-color: rgba(245,200,66,0.4); color: var(--gold); background: rgba(245,200,66,0.06); }

    .vyzva-card { border-top: 1px solid var(--b1); padding: 2rem 0; transition: all 0.2s; }
    .vyzva-card:last-child { border-bottom: 1px solid var(--b1); }
    .vyzva-card:hover { padding-left: 1rem; border-top-color: var(--b2); }

    .vyzva-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-bottom: 10px; }
    .vyzva-title { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 400; line-height: 1.4; }
    .vyzva-ministry { font-size: 10px; padding: 4px 12px; border-radius: 99px; border: 1px solid var(--b1); color: var(--t3); white-space: nowrap; flex-shrink: 0; letter-spacing: 1px; text-transform: uppercase; }
    .vyzva-summary { font-size: 13px; color: var(--t2); line-height: 1.8; margin-bottom: 1.25rem; font-weight: 300; max-width: 600px; }
    .vyzva-meta { display: flex; flex-wrap: wrap; align-items: center; gap: 20px; }
    .meta-item { display: flex; align-items: center; gap: 6px; font-size: 11px; }
    .meta-key { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--t3); opacity: 0.6; }
    .meta-val { color: var(--t2); }
    .vyzva-link { font-size: 11px; color: var(--gold); text-decoration: none; letter-spacing: 1px; text-transform: uppercase; margin-left: auto; opacity: 0.7; transition: opacity 0.15s; }
    .vyzva-link:hover { opacity: 1; }

    .empty { text-align: center; padding: 6rem 1rem; color: var(--t3); font-size: 13px; font-style: italic; font-family: 'Playfair Display', serif; }

    footer { text-align: center; padding: 2rem; font-size: 10px; color: var(--t3); letter-spacing: 2px; text-transform: uppercase; border-top: 1px solid var(--b1); }
    .footer-stars { color: var(--gold); letter-spacing: 6px; font-size: 9px; display: block; margin-bottom: 8px; opacity: 0.5; }

    @media (max-width: 600px) {
      header { padding: 1rem 1.25rem; }
      .container { padding: 2.5rem 1.25rem; }
      .hero h1 { font-size: 2.2rem; }
      .ministry-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="brand">
    <div class="eu-flag">★★★<br>★★★</div>
    <div class="brand-text">
      <div class="brand-name">Granty.sk</div>
      <div class="brand-sub">Európske fondy</div>
    </div>
  </div>
  <div class="sk-badge">
    <div class="sk-flag"></div>
    Slovenská republika
  </div>
</header>

<div class="container">

  <div class="hero">
    <div class="eu-circle">★★★</div>
    <h1>Európske granty<br>pre <em>Slovensko</em></h1>
    <div class="hero-tags">
      <span class="hero-tag">Kohézny fond</span>
      <span class="hero-sep">·</span>
      <span class="hero-tag">EFRR</span>
      <span class="hero-sep">·</span>
      <span class="hero-tag">ESF+</span>
      <span class="hero-sep">·</span>
      <span class="hero-tag">Horizont Európa</span>
    </div>
  </div>

  <div class="section-label">Vyber ministerstvá</div>
  <div class="ministry-grid" id="ministryGrid"></div>

  <button class="scan-btn" id="scanBtn" onclick="startScan()">
    <div class="btn-spinner" id="spinner"></div>
    <span id="scanBtnText">Vyhľadať aktuálne výzvy</span>
  </button>

  <div class="status" id="statusBar">
    <div class="st-spin" id="stSpin"></div>
    <span id="statusText"></span>
  </div>

  <div id="resultsSection" style="display:none">
    <div class="divider"></div>
    <div class="results-header">
      <div class="results-title">Aktuálne výzvy</div>
      <span class="count-pill" id="countBadge">0</span>
    </div>
    <div class="filter-row" id="filterRow"></div>
    <div id="vyzvaList"></div>
  </div>

</div>

<footer>
  <span class="footer-stars">★ ★ ★ ★ ★ ★ ★ ★ ★ ★ ★ ★</span>
  Granty.sk &nbsp;·&nbsp; Slovenská republika &nbsp;·&nbsp; Európska únia
</footer>

<script>
const MINISTRIES = [
  { id: 'mpsr',  name: 'Ministerstvo pôdohospodárstva a rozvoja vidieka SR', icon: '🌾', url: 'https://www.mpsr.sk' },
  { id: 'mhsr',  name: 'Ministerstvo hospodárstva SR',                        icon: '🏭', url: 'https://www.mhsr.sk' },
  { id: 'mfsr',  name: 'Ministerstvo financií SR',                            icon: '💰', url: 'https://www.mfsr.sk' },
  { id: 'mirri', name: 'Ministerstvo investícií, regionálneho rozvoja a informatizácie SR', icon: '💻', url: 'https://www.mirri.gov.sk' },
  { id: 'mdsr',  name: 'Ministerstvo dopravy SR',                             icon: '🚆', url: 'https://www.mindop.sk' },
  { id: 'mzsr',  name: 'Ministerstvo zdravotníctva SR',                       icon: '🏥', url: 'https://www.health.gov.sk' },
  { id: 'msssr', name: 'Ministerstvo školstva, vedy, výskumu a športu SR',   icon: '🎓', url: 'https://www.minedu.sk' },
  { id: 'mpsvr', name: 'Ministerstvo práce, sociálnych vecí a rodiny SR',    icon: '👥', url: 'https://www.employment.gov.sk' },
  { id: 'mzpsr', name: 'Ministerstvo životného prostredia SR',               icon: '🌿', url: 'https://www.minzp.sk' },
  { id: 'mvsr',  name: 'Ministerstvo vnútra SR',                             icon: '🏛', url: 'https://www.minv.sk' },
];

let selected = new Set(MINISTRIES.map(m => m.id));
let allVyzvy = [];

function renderMinistries() {
  document.getElementById('ministryGrid').innerHTML = MINISTRIES.map(m => `
    <div class="ministry-tag active" id="tag_${m.id}" onclick="toggleMinistry('${m.id}')">
      <div class="min-icon">${m.icon}</div>
      <span>${m.name}</span>
    </div>
  `).join('');
}

function toggleMinistry(id) {
  if (selected.has(id)) { selected.delete(id); document.getElementById('tag_'+id).classList.remove('active'); }
  else { selected.add(id); document.getElementById('tag_'+id).classList.add('active'); }
}

function setStatus(msg, type) {
  const bar = document.getElementById('statusBar');
  bar.className = 'status ' + type;
  document.getElementById('statusText').textContent = msg;
  document.getElementById('stSpin').style.display = type === 'scanning' ? 'block' : 'none';
}

async function startScan() {
  if (!selected.size) { alert('Vyber aspoň jedno ministerstvo.'); return; }
  const btn = document.getElementById('scanBtn');
  btn.disabled = true;
  document.getElementById('spinner').style.display = 'block';
  document.getElementById('scanBtnText').textContent = 'Prebieha vyhľadávanie...';
  document.getElementById('resultsSection').style.display = 'none';
  allVyzvy = [];

  const selectedMins = MINISTRIES.filter(m => selected.has(m.id));
  setStatus(`Prehľadávam ${selectedMins.length} ministerstiev — môže trvať 30–60 sekúnd`, 'scanning');

  try {
    const resp = await fetch('/api/scan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ministries: selectedMins })
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || 'Chyba servera');
    allVyzvy = data.vyzvy || [];
    document.getElementById('resultsSection').style.display = 'block';
    document.getElementById('countBadge').textContent = allVyzvy.length;
    if (allVyzvy.length) {
      buildFilters();
      renderVyzvy(allVyzvy);
      setStatus(`Dokončené — nájdených ${allVyzvy.length} výziev`, 'done');
    } else {
      renderVyzvy([]);
      setStatus('Vyhľadávanie dokončené — žiadne výzvy nenájdené', 'done');
    }
  } catch (err) {
    setStatus('Chyba: ' + err.message, 'error');
  }

  btn.disabled = false;
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('scanBtnText').textContent = 'Vyhľadať znova';
}

function buildFilters() {
  const mins = [...new Set(allVyzvy.map(v => v.ministry))];
  document.getElementById('filterRow').innerHTML =
    `<button class="filter-btn active" onclick="filterBy('all',this)">Všetky (${allVyzvy.length})</button>` +
    mins.map(m => {
      const c = allVyzvy.filter(v => v.ministry === m).length;
      return `<button class="filter-btn" onclick="filterBy('${m}',this)">${m} (${c})</button>`;
    }).join('');
}

function filterBy(m, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const list = m === 'all' ? allVyzvy : allVyzvy.filter(v => v.ministry === m);
  document.getElementById('countBadge').textContent = list.length;
  renderVyzvy(list);
}

function renderVyzvy(vyzvy) {
  const el = document.getElementById('vyzvaList');
  if (!vyzvy.length) {
    el.innerHTML = '<div class="empty">Žiadne výzvy nenájdené.</div>';
    return;
  }
  el.innerHTML = vyzvy.map(v => `
    <div class="vyzva-card">
      <div class="vyzva-top">
        <div class="vyzva-title">${esc(v.title||'–')}</div>
        <div class="vyzva-ministry">${esc(v.ministry||'')}</div>
      </div>
      <div class="vyzva-summary">${esc(v.summary||'')}</div>
      <div class="vyzva-meta">
        ${v.deadline?`<div class="meta-item"><span class="meta-key">Termín</span><span class="meta-val">${esc(v.deadline)}</span></div>`:''}
        ${v.amount?`<div class="meta-item"><span class="meta-key">Suma</span><span class="meta-val">${esc(v.amount)}</span></div>`:''}
        ${v.fund?`<div class="meta-item"><span class="meta-key">Fond</span><span class="meta-val">${esc(v.fund)}</span></div>`:''}
        ${v.url?`<a class="vyzva-link" href="${esc(v.url)}" target="_blank">Detail →</a>`:''}
      </div>
    </div>
  `).join('');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

renderMinistries();
</script>
</body>
</html>
